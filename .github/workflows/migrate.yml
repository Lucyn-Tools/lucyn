name: Migrate Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type MIGRATE to confirm'
        required: true
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: migrate-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "MIGRATE" ]; then
            echo "You must type MIGRATE exactly to proceed."
            exit 1
          fi

  migrate:
    name: Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install db package
        run: pnpm --filter @lucyn/db install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lucyn/db exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Apply migrations
        run: pnpm --filter @lucyn/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Migration failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The migration workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'database']
            })
